<!DOCTYPE html>
<html>
<head>
<title>Sangee's Sweet Bakery</title>
<style>
body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: #fff5f7;
}

/* Header */
header{
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    padding: 20px;
    text-align: center;
    color: white;
    font-size: 28px;
    font-weight: bold;
}

/* Hero Section */
.hero{
    text-align: center;
    padding: 40px 20px;
}

.hero img{
    width: 300px;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.hero h2{
    color: #ff4d6d;
    margin-top: 20px;
}

/* Products */
.products{
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    flex-wrap: wrap;
}

.card{
    background: white;
    width: 220px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover{
    transform: scale(1.05);
}

.card img{
    width: 100%;
    border-radius: 10px;
}

button{
    background: #ff4d6d;
    border: none;
    padding: 10px 15px;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

button:hover{
    background: #e63950;
}

/* Footer */
footer{
    background: #ff758c;
    text-align: center;
    padding: 15px;
    color: white;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
🍩 Sangee's Sweet Bakery 🍰
</header>

<section class="hero">
<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff" alt="Bakery">
<h2>Freshly Baked with Love 💖</h2>
<p>Delicious cakes, cupcakes & cookies for every occasion!</p>
</section>

<section class="products">
<div class="card">
<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="Chocolate Cake">
<h3>Chocolate Cake</h3>
<p>₹499</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589308078054-8322e9e6efb9" alt="Cupcakes">
<h3>Cupcakes</h3>
<p>₹199</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c" alt="Cookies">
<h3>Cookies</h3>
<p>₹149</p>
<button>Order Now</button>
</div>
</section>

<footer>
📍chengalpat| 📞 9655053491| © 2026 Sangee's Bakery
</footer>

</body>
</html>
